name: Deploy api

on:
  push:
    branches: [deploy-test]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Checkout branch
        uses: actions/checkout@v4

      - name: 📊 Setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 20.14.0

      - name: 🚀 Build Nest js app
        shell: bash
        run: |
          cd apps/api
          npm install
          npm run build
